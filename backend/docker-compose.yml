services:
  postgres:
    image: postgres:16-alpine
    container_name: starfall-aegis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set in backend/.env}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in backend/.env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in backend/.env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: starfall-aegis-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER must be set in backend/.env}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in backend/.env}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB must be set in backend/.env}?schema=public
    env_file:
      - path: .env
        required: true
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
