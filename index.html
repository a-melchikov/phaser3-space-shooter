<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <title>Starfall Aegis</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#030712" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Starfall Aegis" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon.svg"
    />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180x180.png" />
    <meta
      name="description"
      content="Starfall Aegis — 2D space shooter на Phaser 3."
    />
    <style>
      @font-face {
        font-family: "Orbitron";
        src: url("/fonts/Orbitron-VariableFont_wght.ttf") format("truetype");
        font-weight: 400 900;
        font-style: normal;
        font-display: swap;
      }

      :root {
        color-scheme: dark;
        --safe-area-inset-top: env(safe-area-inset-top, 0px);
        --safe-area-inset-right: env(safe-area-inset-right, 0px);
        --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
        --safe-area-inset-left: env(safe-area-inset-left, 0px);
      }

      html,
      body,
      #app {
        margin: 0;
        width: 100%;
        height: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        overscroll-behavior: none;
        touch-action: none;
      }

      body {
        background:
          radial-gradient(circle at top, rgba(74, 110, 214, 0.24), transparent 35%),
          linear-gradient(180deg, #08111d 0%, #030712 100%);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
        display: flex;
        align-items: stretch;
        justify-content: center;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }

      #app {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding:
          var(--safe-area-inset-top)
          var(--safe-area-inset-right)
          var(--safe-area-inset-bottom)
          var(--safe-area-inset-left);
        box-sizing: border-box;
      }

      canvas {
        display: block;
        max-width: 100vw;
        max-height: 100vh;
        max-height: 100dvh;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
