<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Starfall Aegis</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon.svg"
    />
    <meta
      name="description"
      content="Starfall Aegis — 2D space shooter на Phaser 3."
    />
    <style>
      @font-face {
        font-family: "Orbitron";
        src: url("/fonts/Orbitron-VariableFont_wght.ttf") format("truetype");
        font-weight: 400 900;
        font-style: normal;
        font-display: swap;
      }

      :root {
        color-scheme: dark;
      }

      html,
      body,
      #app {
        margin: 0;
        width: 100%;
        height: 100%;
        min-height: 100vh;
      }

      body {
        background:
          radial-gradient(circle at top, rgba(74, 110, 214, 0.24), transparent 35%),
          linear-gradient(180deg, #08111d 0%, #030712 100%);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
        display: flex;
        align-items: stretch;
        justify-content: center;
      }

      #app {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      canvas {
        display: block;
        max-width: 100vw;
        max-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
